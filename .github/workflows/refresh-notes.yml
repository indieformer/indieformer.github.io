name: Refresh site data

# Daily job that does two things:
#   1. Rebuild notes.html from the beehiiv RSS feed.
#   2. Fetch live Steam data for Feed the Scorchpot → data/scorchpot.json.
# Commits and pushes whichever changed.
# Also exposed as a "Run workflow" button under Actions for on-demand refresh.

on:
  schedule:
    # 07:00 UTC daily = 17:00 / 18:00 Melbourne depending on DST.
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-site-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild notes.html from beehiiv RSS
        run: python3 scripts/build_notes.py

      - name: Fetch Steam demo player count
        run: python3 scripts/fetch_steam_data.py
        continue-on-error: true   # Steam API blip shouldn't break the whole job

      - name: Commit & push only if anything changed
        run: |
          git config user.name  "indieformer-bot"
          git config user.email "bot@indieformer.com"
          git add notes.html data/scorchpot.json
          if git diff --staged --quiet; then
            echo "no changes — nothing to commit"
          else
            # Build a commit message naming whichever files actually changed
            CHANGED=$(git diff --staged --name-only | tr '\n' ' ')
            git commit -m "auto: refresh ${CHANGED}"
            git push
          fi
